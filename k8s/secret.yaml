# Use kubectl create secret or external-secrets in production
# Example: kubectl create secret generic perf-db-secret --from-literal=POSTGRES_PASSWORD=changeme
apiVersion: v1
kind: Secret
metadata:
  name: perf-db-secret
  namespace: perf-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: perf_password
  POSTGRES_USER: perf_user
  POSTGRES_DB: performance_db
