apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictions-api
  namespace: perf-platform
  labels:
    app: predictions-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predictions-api
  template:
    metadata:
      labels:
        app: predictions-api
    spec:
      containers:
        - name: api
          image: perf-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: perf-platform-config
            - secretRef:
                name: perf-db-secret
          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
          volumeMounts:
            - name: models
              mountPath: /app/models
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: model-storage
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: perf-platform
spec:
  selector:
    app: predictions-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
