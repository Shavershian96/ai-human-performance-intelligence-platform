apiVersion: v1
kind: ConfigMap
metadata:
  name: perf-platform-config
  namespace: perf-platform
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: performance_db
  POSTGRES_USER: perf_user
  LOG_LEVEL: INFO
  MODEL_PATH: /app/models/performance_model.pkl
  FEATURE_SCALER_PATH: /app/models/feature_scaler.pkl
  USE_ML_TRAINER_SERVICE: "true"
  ML_TRAINER_URL: http://ml-trainer:8080
  ML_TRAINER_RETRY_ATTEMPTS: "3"
  ML_TRAINER_RETRY_BASE_DELAY_SECONDS: "0.5"
  ML_TRAINER_CIRCUIT_BREAKER_FAILURES: "5"
  ML_TRAINER_CIRCUIT_BREAKER_RESET_SECONDS: "60"
  API_URL: http://api:8000
  PROMETHEUS_URL: http://prometheus:9090
