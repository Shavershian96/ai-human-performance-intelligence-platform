apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
  namespace: perf-platform
  labels:
    app: data-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-ingestion
  template:
    metadata:
      labels:
        app: data-ingestion
    spec:
      containers:
        - name: data-ingestion
          image: perf-platform-data-ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: perf-platform-config
            - secretRef:
                name: perf-db-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: data-ingestion
  namespace: perf-platform
spec:
  selector:
    app: data-ingestion
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
