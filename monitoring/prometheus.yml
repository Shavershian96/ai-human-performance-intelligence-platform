global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "data-ingestion"
    metrics_path: /metrics
    static_configs:
      - targets: ["data-ingestion:8081"]

  - job_name: "ml-trainer"
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-trainer:8080"]
