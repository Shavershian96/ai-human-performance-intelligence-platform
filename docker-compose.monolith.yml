# Monolith mode - API runs training in-process (no ml-trainer service)
# Use for local development: docker-compose -f docker-compose.monolith.yml up -d

version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: perf_user
      POSTGRES_PASSWORD: perf_password
      POSTGRES_DB: performance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perf_user -d performance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: perf_user
      POSTGRES_PASSWORD: perf_password
      POSTGRES_DB: performance_db
      USE_ML_TRAINER_SERVICE: "false"
      MODEL_PATH: /app/models/performance_model.pkl
      FEATURE_SCALER_PATH: /app/models/feature_scaler.pkl
      ENVIRONMENT: production
    volumes:
      - ./models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      POSTGRES_HOST: db
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
